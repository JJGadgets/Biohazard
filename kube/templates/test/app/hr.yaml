---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/app-template-4.6.2/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ${APPNAME}
  namespace: *app
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: *app
  values:
    controllers:
      app:
        type: deployment
        replicas: 1
        pod:
          labels:
            ingress.home.arpa/envoy-internal: allow
            # db.home.arpa/pg: pg-default
            # s3.home.arpa/store: "rgw-${CLUSTER_NAME}"
            # authentik.home.arpa/oidc: allow
            # prom.home.arpa/kps: allow
            # egress.home.arpa/internet: allow
        containers:
          app:
            image: &img
              repository: ${IMAGENAME}
              tag: ${IMAGETAG}
            env: &env
              TZ: "${CONFIG_TZ}"
              _APPNAME_DATABASE_SOURCE:
                valueFrom:
                  secretKeyRef:
                    name: pg-default-pguser-${APPNAME}
                    key: pgbouncer-uri
              GTS_STORAGE_S3_ACCESS_KEY:
                valueFrom:
                  secretKeyRef:
                    name: ${APPNAME}-data-s3
                    key: AWS_ACCESS_KEY_ID
              GTS_STORAGE_S3_SECRET_KEY:
                valueFrom:
                  secretKeyRef:
                    name: ${APPNAME}-media-s3
                    key: AWS_SECRET_ACCESS_KEY
            envFrom: &envFrom
              - secretRef:
                  name: ${APPNAME}-secrets
            securityContext: &sc
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: "10m"
              limits:
                cpu: "4"
                memory: "512Mi"
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              # startup:
              #   enabled: true
              #   spec:
              #     periodSeconds: 1
              #     failureThreshold: 300
              #     initialDelaySeconds: 5
    service:
      app:
        controller: app
        ports:
          http:
            port: 80
            targetPort: 8080
            protocol: HTTP
            appProtocol: http
      # expose: # uncomment if LoadBalancer service needed
      #   primary: false
      #   controller: app
      #   type: LoadBalancer
      #   annotations:
      #     coredns.io/hostname: "${APP_DNS_APPNAME:=${APPNAME}}"
      #     lbipam.cilium.io/ips: "${APP_IP_APPNAME:=127.0.0.1}"
      #   ports:
      #     http:
      #       port: 443
      #       targetPort: 8443
      #       protocol: HTTPS
      #     ldap-tcp:
      #       port: 636
      #       targetPort: 3636
      #       protocol: TCP
      #     ldap-udp:
      #       port: 636
      #       targetPort: 3636
      #       protocol: UDP
    route:
      app:
        # annotations:
        #   external-dns.alpha.kubernetes.io/target: "${DNS_CF:=cf}"
        #   external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
        hostnames: ["${APP_DNS_APPNAME:=${APPNAME}}"]
        parentRefs:
          - name: envoy-internal
            namespace: ingress
            sectionName: internal
        # rules: # uncomment if advanced routing needed or multiple service backends specified
        #   - matches:
        #       - path:
        #           type: PathPrefix
        #           value: /test
        #     backendRefs:
        #       - identifier: app
        #         port: 80
        #   - backendRefs:
        #       - identifier: app
        #         port: 80
    persistence: # delete entries where not necessary
      data:
        existingClaim: ${APPNAME}-data
        advancedMounts:
          app:
            app:
              - subPath: data
                path: /data
      tmp:
        type: emptyDir
        medium: Memory
        sizeLimit: 16Mi
        globalMounts:
          - subPath: tmp
            path: /tmp
    #   config:
    #     type: configMap
    #     identifier: config
    #     advancedMounts:
    #       app:
    #         app:
    #           - subPath: server.toml
    #             path: /data/server.toml
    #   nfs:
    #     type: nfs
    #     server: "${IP_TRUENAS:=127.0.0.1}"
    #     path: "${PATH_NAS_PERSIST_K8S:=/home}"
    #     globalMounts:
    #       - subPath: ${APPNAME}
    #         path: /nfs
    #   tls:
    #     type: secret
    #     name: ${APPNAME}-tls
    #     defaultMode: 0400
    #     advancedMounts:
    #       app:
    #         app:
    #           - subPath: tls.crt
    #             path: /tls/fullchain.pem
    #             readOnly: true
    #           - subPath: tls.key
    #             path: /tls/privkey.pem
    #             readOnly: true
    # configMaps:
    #   config:
    #     data:
    #       server.toml: |
    #         key = value
    defaultPodOptions:
      # hostAliases: # uncomment if authentik OIDC is used
      #   - ip: "${APP_IP_AUTHENTIK:=127.0.0.1}"
      #     hostnames: ["${APP_DNS_AUTHENTIK:=authentik}"]
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      # hostUsers: true
      # securityContext:
      #   runAsNonRoot: true
      #   runAsUser: &uid ${APP_UID_APPNAME:=1000}
      hostUsers: false
      securityContext:
        runAsNonRoot: true
        runAsUser: &uid 1000
        runAsGroup: *uid
        fsGroup: *uid
        fsGroupChangePolicy: Always
        seccompProfile: { type: "RuntimeDefault" }
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: "fuckoff.home.arpa/{{ .Release.Name }}"
                    operator: DoesNotExist
    networkpolicies:
      same-ns:
        # either
        controller: app
        # or
        podSelector: {}
        # end
        policyTypes: [Ingress, Egress]
        rules:
          ingress: [from: [{podSelector: {}}]]
          egress: [to: [{podSelector: {}}]]
