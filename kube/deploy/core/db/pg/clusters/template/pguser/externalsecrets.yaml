---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: "pg-${PG_NAME}-${PG_APP_NS}-${PG_DB_USER}"
  namespace: "${PG_NS}"
spec:
  provider:
    kubernetes:
      remoteNamespace: "${PG_APP_NS}"
      server:
        url: "https://kubernetes.default.svc.cluster.local:443"
        caProvider:
          type: "ConfigMap"
          name: "kube-root-ca.crt"
          key: "ca.crt"
      auth:
        serviceAccount:
          name: "external-secrets-kubernetes-provider-pg-pushsecret"
---
# NOTE: below is Crunchy PGO
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/pushsecret_v1alpha1.json
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: &name "pg-${PG_NAME}-pguser-${PG_DB_USER}"
spec:
  refreshInterval: "1m"
  secretStoreRefs:
    - kind: "SecretStore"
      name: "pg-${PG_NAME}-${PG_APP_NS}-${PG_DB_USER}"
  selector:
    secret:
      name: *name # source secret name
  data:
    - match:
        secretKey: &key "pgbouncer-uri" # source secret key
        remoteRef:
          remoteKey: *name # destination secret name
          property: *key # destination secret key
    - match:
        secretKey: &key "uri"
        remoteRef:
          remoteKey: *name
          property: *key
    - match:
        secretKey: &key "pgbouncer-jdbc-uri"
        remoteRef:
          remoteKey: *name
          property: *key
    - match:
        secretKey: &key "jdbc-uri"
        remoteRef:
          remoteKey: *name
          property: *key
    - match:
        secretKey: &key "pgbouncer-host"
        remoteRef:
          remoteKey: *name
          property: *key
    - match:
        secretKey: &key "host"
        remoteRef:
          remoteKey: *name
          property: *key
    - match:
        secretKey: &key "pgbouncer-port"
        remoteRef:
          remoteKey: *name
          property: *key
    - match:
        secretKey: &key "port"
        remoteRef:
          remoteKey: *name
          property: *key
    - match:
        secretKey: &key "verifier"
        remoteRef:
          remoteKey: *name
          property: *key
    - match:
        secretKey: &key "dbname"
        remoteRef:
          remoteKey: *name
          property: *key
    - match:
        secretKey: &key "user"
        remoteRef:
          remoteKey: *name
          property: *key
    - match:
        secretKey: &key "password"
        remoteRef:
          remoteKey: *name
          property: *key
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/pushsecret_v1alpha1.json
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: &name "pg-${PG_NAME}-ca"
spec:
  refreshInterval: "1m"
  secretStoreRefs:
    - kind: "SecretStore"
      name: "pg-${PG_NAME}-${PG_APP_NS}-${PG_DB_USER}"
  selector:
    secret:
      name: "pg-${PG_NAME}-cluster-cert" # source secret name
  data:
    - match:
        secretKey: &key "ca.crt" # source secret key
        remoteRef:
          remoteKey: *name # destination secret name
          property: *key # destination secret key
---
# NOTE: below is CNPG
---
# yaml-language-server: $schema=https://crds.jank.ing/generators.external-secrets.io/password_v1alpha1.json
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: "pg-${PG_NAME}-pguser-${PG_DB_USER}-cnpg"
  # namespace: "${PG_NS}"
spec:
  secretKeys: ["password"]
  length: 90
  symbolCharacters: "~!$+-|:<>," # https://dba.stackexchange.com/a/286348
  noUpper: false
  allowRepeat: true
---
# yaml-language-server: $schema=https://crds.jank.ing/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name "pg-${PG_NAME}-pguser-${PG_DB_USER}-cnpg"
  # namespace: "${PG_NS}"
spec:
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: *name
  target:
    creationPolicy: Owner
    deletionPolicy: Retain
    name: *name
    template:
      type: kubernetes.io/basic-auth
      metadata:
        labels:
          cnpg.io/reload: "true"
      data:
        # host: "pg-${PG_NAME}-rw.${PG_NS}.svc.cluster.local."
        # jdbc-uri: "jdbc:postgresql://pg-${PG_NAME}-rw.${PG_NS}.svc.cluster.local.:5432/${PG_DB_USER}?password={{ .password }}&user=${PG_DB_USER}"
        # uri: "postgresql://${PG_DB_USER}:{{ .password }}@pg-${PG_NAME}-rw.${PG_NS}.svc.cluster.local.:5432/${PG_DB_USER}"
        username: "${PG_DB_USER}"
        password: '{{ password }}'
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/pushsecret_v1alpha1.json
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: &name "pg-${PG_NAME}-pguser-${PG_DB_USER}-cnpg"
  # namespace: "${PG_NS}"
spec:
  refreshInterval: "1m"
  secretStoreRefs:
    - kind: "SecretStore"
      name: "pg-${PG_NAME}-${PG_APP_NS}-${PG_DB_USER}"
  selector:
    secret:
      name: *name # source secret name
  data:
    # - match:
    #     secretKey: &key "host" # source secret key
    #     remoteRef:
    #       remoteKey: *name # destination secret name
    #       property: *key # destination secret key
    # - match:
    #     secretKey: &key "uri"
    #     remoteRef:
    #       remoteKey: *name
    #       property: *key
    - match:
        secretKey: &key "username"
        remoteRef:
          remoteKey: *name
          property: *key
    - match:
        secretKey: &key "password"
        remoteRef:
          remoteKey: *name
          property: *key
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/pushsecret_v1alpha1.json
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: &name "pg-${PG_NAME}-pguser-${PG_DB_USER}-mtls"
  # namespace: "${PG_NS}"
spec:
  refreshInterval: "1m"
  secretStoreRefs:
    - kind: "SecretStore"
      name: "pg-${PG_NAME}-${PG_APP_NS}-${PG_DB_USER}"
  selector:
    secret:
      name: "${PG_DB_USER}-client-cert" # source secret name
  data:
    # - match:
    #     secretKey: &key "host" # source secret key
    #     remoteRef:
    #       remoteKey: *name # destination secret name
    #       property: *key # destination secret key
    # - match:
    #     secretKey: &key "uri"
    #     remoteRef:
    #       remoteKey: *name
    #       property: *key
    - match:
        secretKey: &key "tls.crt"
        remoteRef:
          remoteKey: *name
          property: *key
    - match:
        secretKey: &key "tls.key"
        remoteRef:
          remoteKey: *name
          property: *key
