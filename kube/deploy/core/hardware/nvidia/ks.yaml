---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: nvidia-app
  namespace: &ns nvidia
  labels: &l
    app.kubernetes.io/name: "nvidia"
    substitution.flux.home.arpa/disabled: "true"
spec:
  targetNamespace: *ns
  commonMetadata:
    labels: *l
  path: ./kube/deploy/core/hardware/nvidia/app
  components:
    - ../../../../core/flux-system/alerts/template/
  dependsOn:
    - name: crds
      namespace: flux-system
