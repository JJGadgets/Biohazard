---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/gateway.networking.k8s.io/gateway_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: &name envoy-external
  annotations:
    external-dns.alpha.kubernetes.io/target: "${DNS_MAIN_CF}"
    gatus.home-operations.com/endpoint: |
      group: ${CLUSTER_NAME}-external
      guarded: true
      ui:
        hide-hostname: true
        hide-url: true
spec:
  gatewayClassName: *name
  infrastructure:
    annotations:
      lbipam.cilium.io/ips: "${APP_IP_ENVOY_EXTERNAL:=127.0.0.1}"
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    - &https
      name: external
      protocol: HTTPS
      # hostname: "*.${DNS_SHORT:=internal}"
      port: 443
      allowedRoutes:
        namespaces:
          from: All
      tls:
        certificateRefs:
          - kind: Secret
            name: short-domain-tls
          - kind: Secret
            name: long-domain-tls
    - <<: *https
      name: public
      hostname: "*.jjgadgets.tech"
      tls:
        certificateRefs:
          - kind: Secret
            name: jjgadgets-tech-tls
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.networking.k8s.io/gatewayclass_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy-external
  namespace: ingress
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: envoy
    namespace: ingress
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: envoy-external
  namespace: ingress
  annotations:
    external-dns.alpha.kubernetes.io/controller: none
spec:
  parentRefs:
    - name: envoy-external
      namespace: ingress
      sectionName: external
  rules:
    - filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: X-Robots-Tag
                value: "noindex, nofollow" # anti search engines
              - name: Cache-Control
                value: "no-store" # don't store caches
              - name: X-Frame-Options
                value: "DENY"
              - name: X-Content-Type-Options
                value: "nosniff"
              - name: X-XSS-Protection
                value: "1; mode=block"
              - name: Referrer-Policy
                value: "no-referrer"
              - name: X-DNS-Prefetch-Control
                value: "off"
              - name: Permissions-Policy
                value: "interest-cohort=()" # anti Google FLoC
              - name: Cross-Origin-Opener-Policy
                value: "same-origin"
              - name: Cross-Origin-Resource-Policy
                value: "same-site"
              - name: Cross-Origin-Embedder-Policy
                value: "require-corp"
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: envoy-public
  namespace: ingress
  annotations:
    external-dns.alpha.kubernetes.io/controller: none
spec:
  parentRefs:
    - name: envoy-external
      namespace: ingress
      sectionName: public
  # hostnames: ["*.jjgadgets.tech"]
  rules:
    - filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: X-Frame-Options
                value: "SAMEORIGIN"
              - name: X-Content-Type-Options
                value: "nosniff"
              - name: X-XSS-Protection
                value: "1; mode=block"
              - name: Referrer-Policy
                value: "strict-origin-when-cross-origin"
              - name: X-DNS-Prefetch-Control
                value: "off"
              - name: Permissions-Policy
                value: "interest-cohort=()"
              - name: Cross-Origin-Opener-Policy
                value: "same-origin"
              - name: Cross-Origin-Resource-Policy
                value: "same-site"
              - name: Cross-Origin-Embedder-Policy
                value: "require-corp"
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/gateway.envoyproxy.io/clienttrafficpolicy_v1alpha1.json
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: envoy-external
  namespace: ingress
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: envoy-external
      sectionName: external
  clientIPDetection:
    xForwardedFor:
      # numTrustedHops: 1
      trustedCIDRs: ["${IP_POD_CIDR_V4:=127.0.0.1/32}"]
    # customHeader:
    #   name: CF-Connecting-IP
    #   failClosed: false
  http2:
    onInvalidMessage: TerminateStream
  tls:
    alpnProtocols:
      - http/1.1
      - h2
    minVersion: "1.2"
    maxVersion: "1.3"
    ciphers:
      - ECDHE-ECDSA-AES128-GCM-SHA256
      - ECDHE-ECDSA-AES256-GCM-SHA384
      - ECDHE-ECDSA-CHACHA20-POLY1305
    ecdhCurves:
      - X25519MLKEM768
      - X25519
      - P-256
    signatureAlgorithms:
      - ecdsa_secp256r1_sha256
      - ecdsa_secp384r1_sha384
      - ecdsa_secp521r1_sha512
      - ed25519
    clientValidation:
      optional: true
  connection:
    bufferLimit: 100Ki
    socketBufferLimit: 1Mi
  tcpKeepalive:
    interval: 10s
    idleTime: 10s
  timeout:
    http:
      requestReceivedTimeout: 10s
  headers:
    enableEnvoyHeaders: false
    disableRateLimitHeaders: true
    requestID: Disable
    lateResponseHeaders:
      remove: ["Server", "X-Powered-By", "X-AspNet-Version", "X-AspNetMvc-Version"]
      set:
        - name: Strict-Transport-Security
          value: max-age=31449600; includeSubDomains; preload
        - name: X-Robots-Tag
          value: "noindex, nofollow" # anti search engines
        - name: Cache-Control
          value: "no-store" # don't store caches
        - name: X-Frame-Options
          value: "DENY"
        - name: X-Content-Type-Options
          value: "nosniff"
        - name: X-XSS-Protection
          value: "1; mode=block"
        - name: Referrer-Policy
          value: "no-referrer"
        - name: X-DNS-Prefetch-Control
          value: "off"
        - name: Permissions-Policy
          value: "interest-cohort=()" # anti Google FLoC
        - name: Cross-Origin-Opener-Policy
          value: "same-origin"
        - name: Cross-Origin-Resource-Policy
          value: "same-site"
        - name: Cross-Origin-Embedder-Policy
          value: "require-corp"
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/gateway.envoyproxy.io/clienttrafficpolicy_v1alpha1.json
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: envoy-public
  namespace: ingress
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: envoy-external
      sectionName: public
  clientIPDetection:
    xForwardedFor:
      # numTrustedHops: 1
      trustedCIDRs: ["${IP_POD_CIDR_V4:=127.0.0.1/32}"]
