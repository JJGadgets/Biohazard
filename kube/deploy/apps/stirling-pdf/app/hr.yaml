---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/app-template-4.6.2/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app stirling-pdf
  namespace: *app
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: *app
  values:
    controllers:
      app:
        type: deployment
        replicas: 1
        pod:
          labels:
            ingress.home.arpa/envoy-internal: allow
            # authentik.home.arpa/oidc: allow
        containers:
          app:
            image: &img
              repository: ghcr.io/stirling-tools/stirling-pdf
              tag: 2.14.2-fat@sha256:aa91c68b85992986302fbdb6735f2c0824e329304e43c814a9b77c9dd0dbe410
            env: &env
              TZ: "${CONFIG_TZ}"
              DOCKER_ENABLE_SECURITY: false
              SECURITY_ENABLE_LOGIN: false
            # envFrom: &envFrom
            #   - secretRef:
            #       name: stirling-pdf-secrets
            securityContext: &sc
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: "10m"
              limits:
                cpu: "4"
                memory: "1Gi"
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
    service:
      app:
        controller: app
        ports:
          http:
            port: 80
            targetPort: 8080
            protocol: HTTP
            appProtocol: http
    route:
      app:
        hostnames: ["${APP_DNS_STIRLING_PDF:=stirling-pdf}"]
        parentRefs:
          - name: envoy-internal
            namespace: ingress
            sectionName: internal
    persistence:
      # data:
      #   existingClaim: stirling-pdf-data
      #   advancedMounts:
      #     app:
      #       app:
      #         - subPath: data
      #           path: /data
      tmp:
        type: emptyDir
        # medium: Memory
        # sizeLimit: 16Mi
        globalMounts:
          - subPath: tmp
            path: /tmp
          - subPath: configs
            path: /configs
          - subPath: logs
            path: /logs
          - subPath: tessdata
            path: /usr/share/tessdata
          - subPath: localbin
            path: /usr/local/bin
          - subPath: homedir
            path: /home/stirlingpdfuser
          - subPath: defaultWebUIConfigs
            path: /app/./pipeline/defaultWebUIConfigs
    defaultPodOptions:
      # hostAliases:
      #   - ip: "${APP_IP_AUTHENTIK:=127.0.0.1}"
      #     hostnames: ["${APP_DNS_AUTHENTIK:=authentik}"]
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      runtimeClassName: gvisor
      securityContext:
        runAsNonRoot: true
        runAsUser: &uid 1000 # upstream `stirlingpdfuser` user
        runAsGroup: *uid
        fsGroup: *uid
        fsGroupChangePolicy: Always
        seccompProfile: { type: "RuntimeDefault" }
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: "fuckoff.home.arpa/{{ .Release.Name }}"
                    operator: DoesNotExist
