---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/app-template-4.6.2/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app llama-cpp
  namespace: *app
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: *app
  values:
    x-models:
      gemma4-26b-a4b:
        model: &gemma4-26b-a4b-model
          # HF_MODEL: unsloth/gemma-4-26B-A4B-it-GGUF
          # HF_HASH: 3365c68df1a83799b846d05324ebfadbb8cc70b3
          # HF_FILE: gemma-4-26B-A4B-it-UD-Q4_K_M.gguf
          # HF_FILE: gemma-4-26B-A4B-it-UD-IQ4_XS.gguf
          # HF_MODEL: unsloth/gemma-4-26B-A4B-it-qat-GGUF
          # HF_HASH: 8a48e33e0795a825ad1c92c88d3ca0d08b03c248
          # HF_FILE: gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf
          HF_MODEL: mudler/gemma-4-26B-A4B-it-heretic-APEX-GGUF
          HF_HASH: 4cdac4ac0e3ba2738f82f25f601f84d97d0040e7
          HF_FILE: gemma-4-26B-A4B-heretic-APEX-I-Compact.gguf # no IQ quants, thus good for CPU
        env: &gemma4-26b-a4b-env
          # Model Params
          LLAMA_ARG_ALIAS: &alias gemma-4-26b-a4b
          LLAMA_ARG_MODEL_ALIAS: "$(LLAMA_ARG_ALIAS)"
          LLAMA_ARG_CTX_SIZE: 131072
          LLAMA_ARG_TEMPERATURE: "0.4"
          LLAMA_ARG_TOP_K: 40
          LLAMA_ARG_TOP_P: "0.92"
          LLAMA_ARG_MIN_P: "0.0"
          LLAMA_ARG_BATCH: 4096
          LLAMA_ARG_UBATCH: 2048
          LLAMA_ARG_PRESENCE_PENALTY: "0.0"
          LLAMA_ARG_REPEAT_PENALTY: "1.0"
          # Cache quants / VRAM fitting
          LLAMA_ARG_CACHE_TYPE_K: q8_0
          LLAMA_ARG_CACHE_TYPE_V: q8_0
          # LLAMA_ARG_CPU_MOE: "enabled"
          # LLAMA_ARG_N_CPU_MOE: 32
          # Others
          LLAMA_ARG_CACHE_RAM: 6144
          LLAMA_ARG_CTX_CHECKPOINTS: 6
          LLAMA_ARG_CHECKPOINT_MIN_SPACING_NT: 16384
          LLAMA_ARG_IMAGE_MIN_TOKENS: 1120
          LLAMA_ARG_IMAGE_MAX_TOKENS: 1120
      gemma4-26b-a4b-mtp:
        model: &gemma4-26b-a4b-mtp-model
          AA_HF_MTP_MODEL: cafkafk/gemma-4-26B-A4B-it-assistant-GGUF-noimatrix
          AA_HF_MTP_HASH: f0af3b1c76c1b562946acadd066af791a1699d48
          AA_HF_MTP_FILE: gemma-4-26B-A4B-it-assistant-Q8_0.gguf
      gemma4-e4b:
        model: &gemma4-e4b-model
          HF_MODEL: ggml-org/gemma-4-E4B-it-GGUF
          HF_HASH: 2714b5519c6c3516b1000e7c5e1eba998dfe1fe8
          HF_FILE: gemma-4-E4B-it-Q4_K_M.gguf
        env: &gemma4-e4b-env
          <<: *gemma4-26b-a4b-env
          LLAMA_ARG_ALIAS: gemma-4-e4b
          LLAMA_ARG_CACHE_RAM: 2048
          LLAMA_ARG_CTX_CHECKPOINTS: 2
      gemma4-e2b:
        model: &gemma4-e2b-model
          HF_MODEL: unsloth/gemma-4-E2B-it-GGUF
          HF_HASH: ecc8b33b2c50598815e4b0f7cea6088e3ae7adb8
          HF_FILE: gemma-4-E2B-it-Q4_K_M.gguf
        env: &gemma4-e2b-env
          <<: *gemma4-26b-a4b-env
          LLAMA_ARG_ALIAS: gemma-4-e2b
          LLAMA_ARG_CACHE_RAM: 2048
          LLAMA_ARG_CTX_CHECKPOINTS: 2
      gemma-4-12b:
        model: &gemma-4-12b-model
          HF_MODEL: unsloth/gemma-4-12B-it-qat-GGUF
          HF_HASH: 10a5e68e89865d0eefaa910c00334643a1093ee9
          HF_FILE: gemma-4-12B-it-qat-UD-Q4_K_XL.gguf
        env: &gemma-4-12b-env
          <<: *gemma4-26b-a4b-env
          LLAMA_ARG_ALIAS: gemma-4-12b
      embeddinggemma:
        model: &embeddinggemma-model
          HF_MODEL: unsloth/embeddinggemma-300m-GGUF
          HF_HASH: 6661a6504c30d8304af13455cb4a5d4f5bc6011f
          HF_FILE: embeddinggemma-300M-Q8_0.gguf
        env: &embeddinggemma-env
          # Model Params
          LLAMA_ARG_ALIAS: &alias embeddinggemma
          LLAMA_ARG_MODEL_ALIAS: "$(LLAMA_ARG_ALIAS)"
          LLAMA_ARG_CTX_SIZE: 2048
          LLAMA_ARG_BATCH: 4096
          LLAMA_ARG_UBATCH: 2048
          # Cache quants / VRAM fitting
          LLAMA_ARG_CACHE_TYPE_K: q8_0
          LLAMA_ARG_CACHE_TYPE_V: q8_0
      qwen3.6-35b-a3b:
        model: &qwen36-35b-a3b-model
          # HF_MODEL: unsloth/Qwen3.6-35B-A3B-MTP-GGUF
          # HF_HASH: 5bc3e238d916f48a861bac2f8a1990a0e9b7e98d
          # HF_FILE: Qwen3.6-35B-A3B-UD-Q4_K_XL.gguf
          # HF_MODEL: byteshape/Qwen3.6-35B-A3B-MTP-GGUF
          # HF_HASH: 83dc80a65cb948b8e5a9dd9776eda7425180dacc
          # HF_FILE: Qwen3.6-35B-A3B-IQ4_XS-4.19bpw.gguf
          # HF_MODEL: byteshape/Qwen3.6-35B-A3B-GGUF
          # HF_HASH: 57f6dec8727b4c3f5498ff2564a0333ac1f6624a
          # HF_FILE: Qwen3.6-35B-A3B-Q4_K_S-4.22bpw.gguf
          HF_MODEL: mudler/Qwen3.6-35B-A3B-APEX-GGUF
          HF_HASH: 42c47e7a396813c593fb12c9307ada5cd8090d4b
          HF_FILE: Qwen3.6-35B-A3B-APEX-I-Compact.gguf
        env: &qwen36-35b-a3b-env
          # Model Params
          LLAMA_ARG_ALIAS: qwen3.6-35b-a3b
          LLAMA_ARG_MODEL_ALIAS: "$(LLAMA_ARG_ALIAS)"
          LLAMA_ARG_CTX_SIZE: 262144
          LLAMA_ARG_TEMPERATURE: "0.6"
          LLAMA_ARG_TOP_K: 20
          LLAMA_ARG_TOP_P: "0.95"
          LLAMA_ARG_MIN_P: "0.0"
          LLAMA_ARG_BATCH: 4096
          LLAMA_ARG_UBATCH: 512
          LLAMA_ARG_PRESENCE_PENALTY: "0.0"
          LLAMA_ARG_REPEAT_PENALTY: "1.0"
          # Qwen 3.6 Preserve Thinking
          LLAMA_CHAT_TEMPLATE_KWARGS: '{"enable_thinking":true,"preserve_thinking":true}'
          # Cache quants
          LLAMA_ARG_CACHE_TYPE_K: q8_0
          LLAMA_ARG_CACHE_TYPE_V: q8_0
          # MTP (Speculative Decoding)
          # LLAMA_ARG_SPEC_TYPE: draft-mtp
          # LLAMA_ARG_SPEC_DRAFT_N_MAX: 2
          # Others
          LLAMA_ARG_IMAGE_MIN_TOKENS: 1024
          LLAMA_ARG_CACHE_RAM: 8192
          LLAMA_ARG_CTX_CHECKPOINTS: 64
          LLAMA_ARG_CHECKPOINT_MIN_SPACING_NT: 2048
      qwen3-embedding:
        model: &qwen3-embedding-model
          HF_MODEL: Qwen/Qwen3-Embedding-0.6B-GGUF
          HF_HASH: 370f27d7550e0def9b39c1f16d3fbaa13aa67728
          HF_FILE: Qwen3-Embedding-0.6B-Q8_0.gguf
        env: &qwen3-embedding-env
          # Model Params
          LLAMA_ARG_ALIAS: &alias embeddinggemma
          LLAMA_ARG_MODEL_ALIAS: "$(LLAMA_ARG_ALIAS)"
          LLAMA_ARG_CTX_SIZE: 32768
          LLAMA_ARG_BATCH: 4096
          LLAMA_ARG_UBATCH: 2048
          # Cache quants / VRAM fitting
          LLAMA_ARG_CACHE_TYPE_K: q8_0
          LLAMA_ARG_CACHE_TYPE_V: q8_0
      gpt-oss-20b:
        model: &gpt-oss-20b-model
          HF_MODEL: ggml-org/gpt-oss-20b-GGUF
          HF_HASH: e1dc459feff949ff451ce107337a2026daa80df8
          HF_FILE: gpt-oss-20b-mxfp4.gguf
        env: &gpt-oss-20b-env
          LLAMA_ARG_ALIAS: gpt-oss-20b
          LLAMA_ARG_CTX_SIZE: 131072
          LLAMA_ARG_TEMPERATURE: "1.0"
          LLAMA_ARG_TOP_K: 0
          LLAMA_ARG_TOP_P: "1.0"
          LLAMA_ARG_MIN_P: "0.0"
          LLAMA_ARG_BATCH: 4096
          LLAMA_ARG_UBATCH: 2048
          LLAMA_ARG_PRESENCE_PENALTY: "0.0"
          LLAMA_ARG_REPEAT_PENALTY: "1.0"
          # Cache quants
          LLAMA_ARG_CACHE_TYPE_K: q8_0
          LLAMA_ARG_CACHE_TYPE_V: q8_0
          # Others
          LLAMA_ARG_CACHE_RAM: 2048
          LLAMA_ARG_CTX_CHECKPOINTS: 2
          LLAMA_ARG_CHECKPOINT_MIN_SPACING_NT: 16384
          LLAMA_ARG_IMAGE_MIN_TOKENS: 1024
          LLAMA_ARG_IMAGE_MAX_TOKENS: 1024
    x-app-env: &env
      TZ: "${CONFIG_TZ}"
      # Intel iGPU SYCL
      ZES_ENABLE_SYSMAN: "1"
      ONEAPI_DEVICE_SELECTOR: level_zero:gpu
      UR_L0_ENABLE_RELAXED_ALLOCATION_LIMITS: "1"
      # llama.cpp config
      LLAMA_OFFLINE: enabled
      LLAMA_ARG_HOST:
        valueFrom:
          fieldRef:
            apiVersion: v1
            fieldPath: status.podIP
      LLAMA_ARG_PORT: &http 8080
      # LLAMA_ARG_N_GPU_LAYERS: all
      LLAMA_ARG_FLASH_ATTN: 1
      LLAMA_ARG_N_PARALLEL: 1
      LLAMA_ARG_CONT_BATCHING: enabled
      LLAMA_ARG_CONTEXT_SHIFT: disabled
      LLAMA_ARG_CACHE_PROMPT: enabled
      LLAMA_ARG_KV_UNIFIED: enabled
      LLAMA_ARG_ENDPOINT_METRICS: enabled
      # LLAMA_ARG_THREADS: 11
      LLAMA_ARG_MMAP: enabled # enable when using CPU/iGPU, supposedly disable when using only eGPU?
        # resourceFieldRef:
        #   resource: limits.cpu
    x-pull-env: &pull-env
      HOME: &mlhome "/models"
      HF_HOME: *mlhome
      HF_HUB_DISABLE_XET: "1"
    x-svc-ports: &ports
      ports:
        http:
          port: 80
          targetPort: *http
          protocol: HTTP
          appProtocol: http
    controllers:
      app:
      # gemma4-26b-a4b:
        # type: statefulset
        type: deployment
        replicas: 1
        pod:
          labels:
            ingress.home.arpa/envoy-internal: allow
            prom.home.arpa/kps: allow
          nodeSelector:
            kubernetes.io/hostname: dorothy
            # gpu.intel.com/device-id.0300-46a6.present: "true"
            # nvidia.com/gpu.product: Tesla-T4
        containers:
          app: &ct
            # NOTE: llama.cpp upstream
            # image: &img
            #   repository: ghcr.io/ggml-org/llama.cpp
            #   # tag: server-intel@sha256:036dd98ac779e947df2591bb373877924e0b9b86d2c9cee52d35335b1f443e3f
            #   tag: server-vulkan@sha256:fe71ba679289f8a301cb964f038baab87491928f6ac28b7697468bc6b9f4cb41
            #   # tag: server-openvino@sha256:3617ff678e9b9bb6733042534e2fcd410d89b572b6f97ced5a702db926a47850
            #   # tag: server-cuda12@sha256:e0334d55309a10a236b7e9e4bff21780882a311e4291e002bcc4fe5838e628af
            # NOTE:  ik_llama.cpp fork for better CPU inference
            image: &img
              repository: ghcr.io/ikawrakow/ik-llama-cpp
              tag: cpu-server@sha256:f7d45daf5056bfd04229643770ee3bef1c218c128f8136af7776c0021ba71617
            command: ["taskset", "-c", "0-7", "/app/llama-server"]
            args: &args
            - --model
            - "/models/$(HF_MODEL)/$(HF_FILE)"
            # - --mmproj
            # - /models/gemma4-26b/mmproj-F16.gguf
            - -sps
            - "0.90"
            - --temp
            - "$(LLAMA_ARG_TEMPERATURE)"
            - --top-p
            - "$(LLAMA_ARG_TOP_P)"
            - --min-p
            - "$(LLAMA_ARG_MIN_P)"
            - --presence-penalty
            - "$(LLAMA_ARG_PRESENCE_PENALTY)"
            - --repeat-penalty
            - "$(LLAMA_ARG_REPEAT_PENALTY)"
            # - --cpu-mask
            # - "0x55" # CPUs 0, 2, 4, 6 --> binary 01010101, CPU 0 from the rightmost (why?) --> hex 0x55
            # - --cpu-strict
            # - "1"
            # - --threads-batch
            # - "6"
            # - --mlock
            # https://www.reddit.com/r/LocalLLaMA/comments/1sgl3qz/gemma_4_on_llamacpp_should_be_stable_now/
            # NOTE: ik_llama.cpp
            - --prompt-cache-all
            - --prompt-cache
            - "/data/ik_llama/prompt-cache/$(HF_HASH)-$(HF_FILE).cache"
            - --slot-save-path
            - "/data/ik_llama/slot-save-path/"
            # - --model-draft
            # - "/models/$(AA_HF_MTP_MODEL)/$(AA_HF_MTP_FILE)"
            # - --spec-type
            # - mtp
            # - --draft-max
            # - "3"
            # - --draft-p-min
            # - "0.0"
            # - --spec-autotune
            - --metrics
            - --no-context-shift
            - --color
            - --jinja
            - --k-cache-hadamard
            - --v-cache-hadamard
            # - -sm
            # - graph # no GPU so not applicable
            - -smgs
            - -mea
            - "256"
            - --split-mode-f32
            - --cpu-moe
            - --merge-up-gate-experts
            - --flash-attn
            - "on"
            # - --mla-use
            # - "3"
            - --mlock
            - --run-time-repack
            - --no-kv-offload
            - -cram
            - "$(LLAMA_ARG_CACHE_RAM)"
            - -crs
            - "0.75"
            - --ctx-checkpoints
            - "$(LLAMA_ARG_CTX_CHECKPOINTS)"
            - --ctx-checkpoints-interval
            - "$(LLAMA_ARG_CHECKPOINT_MIN_SPACING_NT)"
            env:
              <<: [ *env, *qwen36-35b-a3b-model, *qwen36-35b-a3b-env ]
              # LLAMA_ARG_N_GPU_LAYERS: all
              LLAMA_ARG_N_PARALLEL: 1 # TODO: ik_llama.cpp has a Flash Attention bug more commonly triggered by n_parallel > 1 https://github.com/ikawrakow/ik_llama.cpp/issues/1910
              LLAMA_ARG_THREADS: 8
              # LLAMA_ARG_MMAP: disabled # enable when using CPU/iGPU, supposedly disable when using only eGPU?
            # envFrom: &envFrom
            #   - secretRef:
            #       name: llama-cpp-secrets
            securityContext: &sc
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
                add: ["IPC_LOCK"]
            resources:
              requests:
                cpu: "10m"
              limits:
                # cpu: 6 # same number of cores as lowest number of non-HT cores per node
                # gpu.intel.com/i915: "1"
                # nvidia.com/gpu: 1
                memory: "35Gi" # remember to limit cache RAM and context checkpoints to keep RAM low
            probes: &probes
              liveness:
                enabled: true
              readiness:
                enabled: true
      pull: &pull
        type: job
        pod:
          labels:
            egress.home.arpa/internet: allow
          nodeSelector:
            kubernetes.io/hostname: dorothy
        containers:
          app: &pull-ct
            image:
              repository: registry.jjgadgets.tech/jjgadgets/hf
              tag: 1.15.0@sha256:b94cb083b60c422cf7f90bb3423a6ab85744f53e649517396ed812fddcfb2bf4
            command: ["hf", "download", "--exclude", ".git"]
            args: ["--local-dir", "/models/$(HF_MODEL)", "--revision", "$(HF_HASH)", "$(HF_MODEL)", "$(HF_FILE)"]
            workingDir: *mlhome
            env:
              <<: [ *pull-env, *qwen36-35b-a3b-model ]
            securityContext: *sc
            resources:
              requests:
                cpu: 10m
              limits:
                cpu: 4
                memory: "1Gi"
      # pull-mtp:
      #   type: job
      #   pod:
      #     labels:
      #       egress.home.arpa/internet: allow
      #     nodeSelector:
      #       kubernetes.io/hostname: dorothy
      #   containers:
      #     app:
      #       <<: *pull-ct
      #       env:
      #         <<: [ *pull-env, *qwen36-35b-a3b-model ]
      #         HF_MODEL: "$(AA_HF_MTP_MODEL)"
      #         HF_HASH: "$(AA_HF_MTP_HASH)"
      #         HF_FILE: "$(AA_HF_MTP_FILE)"
      embedding:
        type: deployment
        replicas: 1
        pod:
          labels:
            ingress.home.arpa/envoy-internal: allow
            prom.home.arpa/kps: allow
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: "kubernetes.io/hostname"
                        operator: NotIn
                        values: [dorothy]
        containers:
          app:
            image: &img
              repository: ghcr.io/ggml-org/llama.cpp
              tag: server-vulkan@sha256:c5341acd745db14a702158042d7d8ddbd05e631c462dcc7fc8fa42f14e2a5ee0
            command: ["taskset", "-c", "0,2,4,6", "/app/llama-server"]
            args:
            - --embedding
            - --model
            - "/models/$(HF_MODEL)/$(HF_FILE)"
            env:
              <<: [ *env, *qwen3-embedding-model, *qwen3-embedding-env ]
              # llama.cpp config
              # LLAMA_ARG_N_GPU_LAYERS: all
              LLAMA_ARG_N_PARALLEL: 2
              LLAMA_ARG_THREADS: 4
              LLAMA_ARG_MMAP: enabled # enable when using CPU/iGPU, supposedly disable when using only eGPU?
                # resourceFieldRef:
                #   resource: limits.cpu
            securityContext: *sc
            resources:
              requests:
                cpu: "10m"
              limits:
                memory: "2Gi" # remember to limit cache RAM and context checkpoints to keep RAM low
            probes: *probes
      pull-embedding:
        type: job
        pod:
          labels:
            egress.home.arpa/internet: allow
        containers:
          app:
            <<: *pull-ct
            env:
              <<: [ *pull-env, *qwen3-embedding-model ]
      # lite:
      #   type: deployment
      #   replicas: 1
      #   pod:
      #     labels:
      #       ingress.home.arpa/envoy-internal: allow
      #       # prom.home.arpa/kps: allow
      #     affinity:
      #       nodeAffinity:
      #         requiredDuringSchedulingIgnoredDuringExecution:
      #           nodeSelectorTerms:
      #             - matchExpressions:
      #                 - key: "kubernetes.io/hostname"
      #                   operator: NotIn
      #                   values: [dorothy]
      #   containers:
      #     app:
      #       image:
      #         repository: ghcr.io/ikawrakow/ik-llama-cpp
      #         tag: cpu-server@sha256:4648f7f917031663b67d27c85ef6ca9c68d3459973b45fd06a537c0e52ef229e
      #       command: ["taskset", "-c", "0,2,4,6", "/app/llama-server"]
      #       args: *args
      #       env:
      #         <<: [ *env, *gemma4-e2b-model, *gemma4-e2b-env ]
      #         # llama.cpp config
      #         LLAMA_ARG_N_PARALLEL: 1
      #         LLAMA_ARG_THREADS: 4
      #         LLAMA_ARG_MMAP: enabled # enable when using CPU/iGPU, supposedly disable when using only eGPU?
      #           # resourceFieldRef:
      #           #   resource: limits.cpu
      #       securityContext: *sc
      #       resources:
      #         requests:
      #           cpu: "10m"
      #         limits:
      #           # gpu.intel.com/i915: "1"
      #           memory: "8Gi" # remember to limit cache RAM and context checkpoints to keep RAM low
      #       probes: *probes
      # pull-lite:
      #   type: job
      #   pod:
      #     labels:
      #       egress.home.arpa/internet: allow
      #   containers:
      #     app:
      #       <<: *pull-ct
      #       env:
      #         <<: [ *pull-env, *gemma4-e2b-model ]
    service:
      app: &svc
        <<: *ports
        controller: app
        forceRename: *app
      # lite:
      #   <<: *ports
      #   controller: lite
      embedding:
        <<: *ports
        controller: embedding
    persistence:
      local:
        existingClaim: llama-cpp-local
        advancedMounts:
          app: &local
            app:
              - subPath: models
                path: /models
              - subPath: "data/ik_llama/prompt-cache"
                path: "/data/ik_llama/prompt-cache"
              - subPath: "data/ik_llama/slot-save-path"
                path: "/data/ik_llama/slot-save-path"
          pull: *local
          # pull-mtp: *local
      misc:
        existingClaim: llama-cpp-misc
        advancedMounts:
          embedding: &misc
            app:
              - subPath: models
                path: /models
          pull-embedding: *misc
          # lite: *misc
          # pull-lite: *misc
      tmp:
        type: emptyDir
        medium: Memory
        sizeLimit: 16Mi
        globalMounts:
          - subPath: tmp
            path: /tmp
          # - subPath: shader-cache
          #   path: /.cache
    defaultPodOptionsStrategy: merge
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      # hostUsers: false
      securityContext:
        runAsNonRoot: true
        runAsUser: &uid 98341
        runAsGroup: *uid
        fsGroup: *uid
        fsGroupChangePolicy: Always
        # supplementalGroups: [44]
        seccompProfile: { type: "RuntimeDefault" }
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: "fuckoff.home.arpa/{{ .Release.Name }}"
                    operator: DoesNotExist
    networkpolicies:
      from-frontends:
        podSelector: {}
        policyTypes: [Ingress, Egress]
        rules:
          ingress:
            - from:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: open-webui
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: sillytavern
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: code-server
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: home-assistant
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: opencode
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: openclaw
    serviceMonitor:
      app: &sm
        service:
          identifier: app
        endpoints:
          - port: metrics
            scheme: http
            path: /metrics
      embedding:
        <<: *sm
        service:
          identifier: embedding
