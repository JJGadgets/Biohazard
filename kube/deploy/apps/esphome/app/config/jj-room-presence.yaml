---
.substitutions: &subs !include
  file: "./.metadata.yaml"
  vars:
    area: &area "JJ's Room"
    name: &name "Presence"
substitutions:
  <<: *subs
  area: *area
  name: *name
  # presence_id: "aircon_$${area_id}"
  wifi_ip: !secret jj_room_presence_ip
  # wifi_jj_room: 2
  # wifi_living_room: 1
  description: "XIAO 60GHz mmWave Presence Sensor with Human Breathing and Heartrate for $${area}"
packages:
  common: !include
    file: ./.common.yaml
    vars:
      board: "$${board | default('seeed_xiao_esp32c6')}"
  wifi: !include
    file: ./.wifi.yaml
    vars:
      wifi_ip: "$${wifi_ip}"
  bluetooth-proxy: !include
    file: ./.bluetooth-proxy.yaml
#   mqtt: !include
#     file: ./.mqtt.yaml
#     vars:
#       mqtt_username: !secret mqtt_cn105_username
#       mqtt_password: !secret mqtt_cn105_password
#       mqtt_prefix: "cn105/$${area_dns}"

# Seeed Studio Xiao ESP32-C6 + MR60BHA2 60GHz mmWave Breathing and Heartbeat Detection Sensor Kit
uart:
  tx_pin: GPIO16
  rx_pin: GPIO17
  baud_rate: 115200
  parity: NONE
  stop_bits: 1
seeed_mr60bha2:
# Presence Sensor
binary_sensor:
  - platform: seeed_mr60bha2
    has_target:
      name: "Presence"
# Human Breathing & Heartbeat Detection
sensor:
  - platform: seeed_mr60bha2
    breath_rate:
      name: "Real-time respiratory rate"
    heart_rate:
      name: "Real-time heart rate"
    distance:
      name: "Distance to detection object"
    num_targets:
      name: "Number of people"
# logger:
#   logs:
#     CYCLE: WARN
