---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/app-template-4.6.2/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app gotosocial
  namespace: *app
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: *app
  values:
    controllers:
      app:
        type: deployment
        replicas: 1
        pod:
          labels:
            ingress.home.arpa/envoy-internal: "allow"
            ingress.home.arpa/envoy-external: "allow"
            authentik.home.arpa/oidc: "allow"
            egress.home.arpa/internet: "allow"
            prom.home.arpa/kps: "allow"
        containers:
          app:
            image: &img
              repository: docker.io/superseriousbusiness/gotosocial
              tag: 0.20.2@sha256:3a195bde145798ff7a18609a06c1b3aa0e42d4c66f2e8708d9901a91d9a667cb
            env: &env
              TZ: "${CONFIG_TZ}"
              GTS_APPLICATION_NAME: "The JJGadgets Hut"
              GTS_LANDING_PAGE_USER: "jj"
              GTS_HOST: &host "social.jjgadgets.tech"
              GTS_ACCOUNT_DOMAIN: "jjgadgets.tech"
              GTS_PROTOCOL: "https" # not HTTP server listen mode, but used for generating URLs etc
              GTS_BIND_ADDRESS: &ip
                valueFrom:
                  fieldRef:
                    apiVersion: v1
                    fieldPath: status.podIP
              GTS_PORT: &http 8080
              GTS_TRUSTED_PROXIES: "${IP_POD_CIDR_V4}"
              GTS_ADVANCED_RATE_LIMIT_EXCEPTIONS: "${IP_JJ_V4}"
              GTS_ACCOUNTS_REGISTRATION_OPEN: "false"
              GTS_LOG_FORMAT: json
              GTS_METRICS_ENABLED: "true"
              OTEL_METRICS_PRODUCERS: prometheus
              OTEL_METRICS_EXPORTER: prometheus
              OTEL_EXPORTER_PROMETHEUS_HOST: *ip
              OTEL_EXPORTER_PROMETHEUS_PORT: &prom 9464
              GTS_OIDC_ENABLED: "true"
              GTS_OIDC_IDP_NAME: "JJGadgets Auth"
              # OIDC secrets in ExternalSecret envFrom
              GTS_DB_TYPE: "sqlite"
              GTS_DB_ADDRESS: "/gotosocial/storage/db/gotosocial.db"
              GTS_STORAGE_LOCAL_BASE_PATH: &media "/gotosocial/storage/media"
              GOGC: off
              GOMEMLIMIT: "800MiB"
                # resourceFieldRef:
                #   resource: limits.memory
              GOMAXPROCS:
                resourceFieldRef:
                  resource: limits.cpu
            envFrom: &envFrom
              - secretRef:
                  name: gotosocial-secrets
            securityContext: &sc
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 20m
              limits:
                cpu: "3"
                memory: 1Gi
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup: # in case of large DB migrations
                enabled: true
                spec:
                  periodSeconds: 1
                  failureThreshold: 14400
    service:
      app:
        controller: app
        ports:
          http:
            primary: true
            port: 80
            targetPort: *http
            protocol: HTTP
            appProtocol: http
          metrics:
            primary: false
            port: *prom
            protocol: HTTP
            appProtocol: http
    route:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: "${DNS_CF:=cf}"
          external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
        hostnames: [*host]
        parentRefs:
          - name: envoy-internal
            namespace: ingress
            sectionName: internal
          - name: envoy-external
            namespace: ingress
            sectionName: public
    persistence:
      data:
        existingClaim: gotosocial-data
        advancedMounts:
          app:
            app:
              - subPath: data
                path: /gotosocial/storage
              - subPath: tmp
                path: /tmp
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      hostAliases:
        - ip: "${APP_IP_AUTHENTIK:=127.0.0.1}"
          hostnames: ["${APP_DNS_AUTHENTIK:=authentik}"]
      dnsConfig: # avoid flooding Cilium dnsproxy
        options:
          - name: ndots
            value: "1"
      hostUsers: false
      securityContext:
        runAsNonRoot: true
        runAsUser: &uid 65534
        runAsGroup: *uid
        fsGroup: *uid
        fsGroupChangePolicy: Always
        seccompProfile: { type: "RuntimeDefault" }
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: "fuckoff.home.arpa/{{ .Release.Name }}"
                    operator: DoesNotExist
    networkpolicies:
      same-ns:
        podSelector: {}
        policyTypes: [Ingress, Egress]
        rules:
          ingress: [from: [{podSelector: {}}]]
          egress: [to: [{podSelector: {}}]]
    serviceMonitor:
      app:
        service:
          identifier: app
        endpoints:
          - port: metrics
            scheme: http
            path: /metrics
