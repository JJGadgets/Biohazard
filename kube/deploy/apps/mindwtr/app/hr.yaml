---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/app-template-4.6.2/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app mindwtr
  namespace: *app
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: *app
  values:
    controllers:
      cloud:
        type: deployment
        replicas: 1
        pod:
          labels:
            ingress.home.arpa/envoy-internal: allow
        containers:
          app: &ct
            image: &img
              repository: ghcr.io/dongdongbh/mindwtr-cloud
              tag: 1.1.0@sha256:541322f73d113d7a02d079d81328391448d64b7601646ce12b69b2149bb1e6c4
            env: &env
              TZ: "${CONFIG_TZ}"
            envFrom: &envFrom
              - secretRef:
                  name: mindwtr-secrets
            securityContext: &sc
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: "10m"
              limits:
                cpu: "4"
                memory: "150Mi"
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  periodSeconds: 1
                  failureThreshold: 600
                  initialDelaySeconds: 5
      app:
        type: deployment
        replicas: 1
        pod:
          labels:
            ingress.home.arpa/envoy-internal: allow
        containers:
          app: &ct
            image: &img
              repository: ghcr.io/dongdongbh/mindwtr-app
              tag: 1.1.0@sha256:4353eae38527ded8bf3fc2ddc6514e546d22199751a034594ade2c80b5155ed6
            env: &env
              TZ: "${CONFIG_TZ}"
            securityContext: *sc
            resources:
              requests:
                cpu: "10m"
              limits:
                cpu: "4"
                memory: "100Mi"
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
    service:
      cloud:
        controller: cloud
        ports:
          http:
            port: 80
            targetPort: 8787
            protocol: HTTP
            appProtocol: http
      app:
        controller: app
        ports:
          http:
            port: 80
            targetPort: 5173
            protocol: HTTP
            appProtocol: http
    route:
      app:
        hostnames: ["${APP_DNS_MINDWTR:=mindwtr}"]
        parentRefs:
          - name: envoy-internal
            namespace: ingress
            sectionName: internal
        rules:
          - backendRefs:
              - identifier: app
                port: 80
      cloud:
        hostnames: ["${APP_DNS_MINDWTR_CLOUD:=mindwtr-cloud}"]
        parentRefs:
          - name: envoy-internal
            namespace: ingress
            sectionName: internal
        rules:
          - backendRefs:
              - identifier: cloud
                port: 80
    persistence:
      data:
        existingClaim: mindwtr-data
        advancedMounts:
          cloud:
            app:
              - subPath: data
                path: /app/cloud_data
      tmp:
        type: emptyDir
        medium: Memory
        sizeLimit: 16Mi
        globalMounts:
          - subPath: cache
            path: /var/cache/nginx
          - subPath: run
            path: /var/run
      # tmp:
      #   type: emptyDir
      #   medium: Memory
      #   sizeLimit: 16Mi
      #   globalMounts:
      #     - subPath: tmp
      #       path: /tmp
    defaultPodOptions:
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      runtimeClassName: gvisor
      securityContext:
        runAsNonRoot: true
        runAsUser: &uid 1000 # upstream `bun` user
        runAsGroup: *uid
        fsGroup: *uid
        fsGroupChangePolicy: Always
        seccompProfile: { type: "RuntimeDefault" }
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: "fuckoff.home.arpa/{{ .Release.Name }}"
                    operator: DoesNotExist
    networkpolicies:
      same-ns:
        podSelector: {}
        policyTypes: [Ingress, Egress]
        rules:
          ingress: [from: [{podSelector: {}}]]
          egress: [to: [{podSelector: {}}]]
