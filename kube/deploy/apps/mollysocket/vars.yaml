---
# yaml-language-server: $schema=https://crds.jank.ing/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name "${CLUSTER_NAME:=biohazard}-vars"
  namespace: mollysocket
spec:
  refreshInterval: 1m
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1p
  dataFrom:
    - extract:
        key: ".${CLUSTER_NAME}-vars"
    - extract:
        key: "authentik vars - ${CLUSTER_NAME}"
    - extract:
        key: "MollySocket - ${CLUSTER_NAME}"
    - extract:
        key: "ntfy - ${CLUSTER_NAME}"
  target:
    creationPolicy: Owner
    deletionPolicy: Retain
    name: *name
    template:
      type: Opaque
      data:
        # Core cluster-wide vars
        CLUSTER_NAME: "${CLUSTER_NAME:=biohazard}"
        CONFIG_TZ: '{{ .CONFIG_TZ }}'
        # App specific
        APP_DNS_MOLLYSOCKET: '{{ .APP_DNS_MOLLYSOCKET }}'
        APP_IP_MOLLYSOCKET_VPN: '{{ .APP_IP_MOLLYSOCKET_VPN }}'
        APP_MAC_MOLLYSOCKET_VPN: '{{ .APP_MAC_MOLLYSOCKET_VPN }}'
        # authentik hostAliases
        APP_DNS_AUTHENTIK: '{{ .APP_DNS_AUTHENTIK }}'
        APP_IP_AUTHENTIK: '{{ .APP_IP_AUTHENTIK }}'
        # ntfy hostAliases
        APP_DNS_NTFY: '{{ .APP_DNS_NTFY }}'
        APP_IP_NTFY_MX: '{{ .APP_IP_NTFY_MX }}'
