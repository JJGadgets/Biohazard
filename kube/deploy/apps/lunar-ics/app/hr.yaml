---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/app-template-4.6.2/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app lunar-ics
  namespace: *app
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: *app
  values:
    controllers:
      app:
        type: deployment
        replicas: 1
        pod:
          labels:
            ingress.home.arpa/envoy-internal: allow
        containers:
          app:
            image: &img
              repository: ghcr.io/ciel-shieru/lunar-ics
              tag: 0.2.1@sha256:c5cb23cc63929b872178da571a263dadd65cc139791e463503df4b94284568e4
            env: &env
              LUNAR_ICS_TZ: "${CONFIG_TZ}"
              LUNAR_ICS_LOG_ENABLED: true
              LUNAR_ICS_LOG_TRUSTED_PROXIES: "${IP_POD_CIDR_INGRESS_V4}"
            securityContext: &sc
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: "10m"
              limits:
                cpu: "4"
                memory: "100Mi"
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              # startup:
              #   enabled: true
              #   spec:
              #     periodSeconds: 1
              #     failureThreshold: 300
              #     initialDelaySeconds: 5
    service:
      app:
        controller: app
        ports:
          http:
            port: 80
            targetPort: 8080
            protocol: HTTP
            appProtocol: http
    route:
      app:
        # annotations:
        #   external-dns.alpha.kubernetes.io/target: "${DNS_CF:=cf}"
        #   external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
        hostnames: ["${APP_DNS_LUNAR_ICS:=lunar-ics}"]
        parentRefs:
          - name: envoy-internal
            namespace: ingress
            sectionName: internal
    defaultPodOptions:
      runtimeClassName: gvisor
      securityContext:
        runAsNonRoot: true
        runAsUser: &uid 65534
        runAsGroup: *uid
        fsGroup: *uid
        fsGroupChangePolicy: Always
        seccompProfile: { type: "RuntimeDefault" }
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: "fuckoff.home.arpa/{{ .Release.Name }}"
                    operator: DoesNotExist
