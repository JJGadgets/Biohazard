---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/app-template-4.6.2/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app openclaw
  namespace: *app
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: *app
  values:
    controllers:
      app:
        type: deployment
        replicas: 1
        pod:
          hostname: *app
          labels:
            ingress.home.arpa/envoy-internal: allow
            dns.home.arpa/l7: "true"
            egress.home.arpa/github: allow
            egress.home.arpa/cloudflare: allow
            egress.home.arpa/apiserver: allow
            # egress.home.arpa/internet: allow
          annotations:
            ipam.cilium.io/ip-pool: vpn-vlan
            ipam.cilium.io/require-pool-match: "true"
        containers:
          app:
            image: &img
              repository: ghcr.io/openclaw/openclaw
              tag: 2026.6.8@sha256:9f55f0cb32b2925a983f40726440189b8f422ec61ae2a0fb0cf90403cf6d63d7
            env: &env
              TZ: "${CONFIG_TZ}"
              OPENCLAW_LOG_LEVEL: debug
              BROWSER_WS_ENDPOINT: "ws://localhost:9222"
              HOME: &pvc /home/openclaw
              OPENCLAW_HOME: *pvc
              GOPATH: "$(HOME)/go"
              OPENCLAW_GATEWAY_PORT: &http 8080
              PATH: "$(HOME)/.local/bin:$(HOME)/.local/share/mise/shims:$(HOME)/.local/go/bin:/home/linuxbrew/.linuxbrew/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
              PIP_BREAK_SYSTEM_PACKAGES: "1"
              TERM: xterm-256color
            envFrom: &envFrom
              - secretRef:
                  name: openclaw-secrets
            securityContext: &sc
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: "10m"
              limits:
                cpu: "4"
                memory: "1Gi"
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
        serviceAccount:
          identifier: app
        initContainers:
          setup:
            image: *img
            command:
              - "sh"
              - "-c"
              - |
                while [ ! -z "$(pgrep node)" ] || [ ! -s $(HOME)/.openclaw/openclaw.json ]; do
                  echo 'OpenClaw has not been setup, please exec to this container and run `openclaw setup` for the app to startup!';
                  sleep 60;
                done;
            env: *env
            securityContext: *sc
    service:
      app:
        controller: app
        ports:
          http:
            port: 80
            targetPort: *http
            protocol: HTTP
            appProtocol: http
    route:
      app: &route
        hostnames: ["${APP_DNS_OPENCLAW:=openclaw}"]
        parentRefs:
          - name: envoy-internal
            namespace: ingress
            sectionName: internal
        # NOTE: `manifest.webmanifest must be excluded as unauth on authentik forward auth provider for PWA install to work`
    persistence:
      # config:
      #   type: configMap
      #   identifier: config
      #   advancedMounts:
      #     app:
      #       app:
      #         - subPath: server.toml
      #           path: /data/server.toml
      data:
        existingClaim: openclaw-data
        advancedMounts:
          app:
            app: &mount
              - subPath: data
                path: *pvc
            setup: *mount
      misc:
        existingClaim: openclaw-misc
        advancedMounts:
          app:
            app:
              - subPath: brew
                path: /home/linuxbrew
              - subPath: nix
                path: /nix
              - subPath: go
                path: /home/openclaw/go
              - subPath: go-local
                path: /home/openclaw/.local/go
              - subPath: mise
                path: /home/openclaw/.local/share/mise
              - subPath: gradle
                path: /home/openclaw/.gradle
      tmp:
        type: emptyDir
        medium: Memory
        globalMounts:
          - subPath: tmp
            path: /tmp
      # nfs:
      #   type: nfs
      #   server: "${IP_TRUENAS:=127.0.0.1}"
      #   path: "${PATH_NAS_PERSIST_K8S:=/home}"
      #   globalMounts:
      #     - subPath: openclaw
      #       path: /nfs
    defaultPodOptions:
      automountServiceAccountToken: true
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      runtimeClassName: gvisor
      securityContext:
        runAsNonRoot: true
        runAsUser: &uid ${APP_UID_OPENCLAW:=1000}
        runAsGroup: *uid
        fsGroup: *uid
        fsGroupChangePolicy: Always
        seccompProfile: { type: "RuntimeDefault" }
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: "fuckoff.home.arpa/{{ .Release.Name }}"
                    operator: DoesNotExist
    networkpolicies:
      app:
        controller: app
        policyTypes: [Ingress, Egress]
        rules:
          egress:
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: llama-cpp
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: searxng
    serviceAccount:
      app: {}
    rbac:
      roles:
        openclaw-exec-deploy-llm:
          type: Role
          rules:
            - apiGroups: [""]
              resources: ["pods/exec"]
              verbs: ["create"]
            - apiGroups: ["apps"]
              resources: ["deployments"]
              verbs: ["patch", "update"]
      bindings:
        openclaw-exec-deploy-llm:
          type: RoleBinding
          roleRef:
            identifier: openclaw-exec-deploy-llm
          subjects:
            - identifier: app
        cluster-read-only:
          type: ClusterRoleBinding
          roleRef:
            kind: ClusterRole
            name: view
          subjects:
            - identifier: app
