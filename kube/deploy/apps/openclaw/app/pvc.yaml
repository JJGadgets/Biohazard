---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: "openclaw-misc"
  namespace: &app "openclaw"
  annotations:
    description: "PVC for misc files that don't need to be backed up, like Homebrew."
  labels:
    app.kubernetes.io/name: *app
    kustomize.toolkit.fluxcd.io/prune: "Disabled"
spec:
  storageClassName: "block-2"
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: "50Gi"
